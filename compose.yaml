services:
  mysql:
    image: mysql:8.0
    container_name: api_ai_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: api_ai_db
      MYSQL_ROOT_PASSWORD: 110204
      MYSQL_USER: api_user
      MYSQL_PASSWORD: 123123
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

volumes:
  mysql_data:
